config-version: 35

locale: "en"

server-name: ""

ai:
  enabled: true
  server: "https://guardac.net"
  api-key: "PASTE-YOUR-GUARDAC-KEY"
  only-alert: false

alerts:
  min-hit-confidence: 75
  min-hits: 3
  print-to-console: true
  sound:
    enabled: true
    type: "BLOCK_NOTE_BLOCK_PLING"
    volume: 0.8
    pitch: 1.5

vl-decay:
  enabled: true
  interval-seconds: 60
  amount: 1
  skip-in-combat: true

animations:
  enabled: true
  auto-on-ban: false
  duration-ticks: 60
  particle: FLAME
  particle-count: 30
  sound: true
  fallback-ban-time: "30d"
  fallback-ban-reason: "Cheating software detected (GuardAC)"

menu:
  click-commands: []

fingerprint:
  enabled: true

geyser:
  exempt-bedrock: true

auto-update:
  enabled: true
  notify-staff: true

worldguard:
  enabled: false
  disabled-regions:
    - "world:spawn"

combat-reset:
  enabled: true

combat-suppression:
  enabled: false

cross-server:
  enabled: false

web-commands:
  enabled: true
  ban-bridge: "auto"
  ban-command: ""
  tempban-command: ""
  unban-command: ""

reputation:
  enabled: true
  report: true
  check-on-join: true
  alert-threshold: 1
