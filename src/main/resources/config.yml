config-version: 31

locale: "en"

server-name: ""

ai:
  enabled: true
  server: "https://guardac.net"
  api-key: "PASTE-YOUR-GUARDAC-KEY"
  sequence: 40
  timeout-seconds: 5
  min-tps-analyze: 15.0
  only-alert: false

alerts:
  min-hit-confidence: 75
  min-hits: 3
  print-to-console: true
  sound:
    enabled: true
    type: "BLOCK_NOTE_BLOCK_PLING"
    volume: 0.8
    pitch: 1.5

vl-decay:
  enabled: true
  interval-seconds: 60
  amount: 1
  skip-in-combat: true

punishment:
  cooldown-ms: 5000

animations:
  enabled: true
  auto-on-ban: true
  default: particles
  duration-ticks: 60
  particle: FLAME
  particle-count: 30
  drop-inventory: true
  sound: true
  pig-height: 10
  fallback-ban-time: "30d"
  fallback-ban-reason: "Cheating software detected (GuardAC)"

menu:
  click-commands: []

fingerprint:
  enabled: true
  warmup-hits: 30
  drift-margin: 0.35
  min-recent: 0.55

geyser:
  exempt-bedrock: true

client-brand:
  enabled: true

auto-update:
  enabled: true
  check-interval-hours: 6
  notify-staff: true

worldguard:
  enabled: false
  disabled-regions:
    - "world:spawn"

persist-buffer:
  enabled: true
  grace-minutes: 5
  decay-per-hour: 5.0
  cap-on-restore: 40.0
  ttl-minutes: 1440

combat-reset:
  enabled: true
  after-seconds: 60

combat-suppression:
  enabled: false
  penalty:
    start-probability: 0.75
    max-percent: 40
    reset-after-seconds: 10
  isolate:
    enabled: true
    repeat-window-seconds: 45
    duration-seconds: 12
    notify-suspect: true

deep-scan:
  windows: 8
  timeout-seconds: 120

cross-server:
  enabled: false
  poll-seconds: 10

web-commands:
  enabled: true
  poll-seconds: 15
  ban-bridge: "auto"
  ban-command: ""
  tempban-command: ""
  unban-command: ""

reputation:
  enabled: true
  report: true
  check-on-join: true
  alert-threshold: 1

debug:
  enabled: false
  log-probability: false
