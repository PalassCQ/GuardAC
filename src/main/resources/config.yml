# Быстрый старт: впиши ключ в ai.api-key, затем /guard reload.
# Ключ: https://guardac.net

config-version: 21

# en | ru
locale: "en"

ai:
  enabled: true
  server: "https://guardac.net"
  api-key: "PASTE-YOUR-GUARDAC-KEY"
  sequence: 40
  step: 10
  timeout-seconds: 5
  continuous: false
  min-movement: 15.0
  min-tps-analyze: 15.0
  # true = только предупреждать стафф, без наказаний
  only-alert: false

  buffer:
    flag: 50.0
    reset-on-flag: 25.0
    multiplier: 100.0
    decrease: 0.25

alerts:
  min-confidence-percent: 0
  print-to-console: true
  sound:
    enabled: true
    type: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.8
  # раннее предупреждение стаффу, до основного оповещения
  suspicious:
    enabled: true
    buffer: 25.0

vl-decay:
  enabled: true
  interval-seconds: 60
  amount: 1
  skip-in-combat: true

punishment:
  cooldown-ms: 5000
  min-tps: 16.0

animations:
  enabled: true
  auto-on-ban: true
  # pig | explode | particles | lightning | vortex | meteor | cage
  default: particles
  duration-ticks: 60
  particle: FLAME
  particle-count: 30
  drop-inventory: true
  sound: true
  pig-height: 10

# команды меню /guard menu при клике по игроку (<admin>, <target>)
# пусто = спектатор + телепорт
menu:
  click-commands: []

# отслеживает резкую смену стиля прицеливания (чит, чужой аккаунт). только алерт
fingerprint:
  enabled: true
  warmup-hits: 30
  drift-margin: 0.35
  min-recent: 0.55

geyser:
  exempt-bedrock: true

client-brand:
  enabled: true

# регионы WorldGuard, где проверки не идут
worldguard:
  enabled: false
  disabled-regions:
    - "world:spawn"

# помнит подозрение об игроке после выхода, чтобы не сбрасывалось перезаходом
persist-buffer:
  enabled: true
  grace-minutes: 5
  decay-per-hour: 5.0
  cap-on-restore: 40.0
  ttl-minutes: 1440

combat-reset:
  enabled: true
  after-seconds: 60

# временная мягкая защита в бою, не наказание
combat-suppression:
  enabled: false
  penalty:
    start-probability: 0.75
    max-percent: 40
    reset-after-seconds: 10
  isolate:
    enabled: true
    repeat-window-seconds: 45
    duration-seconds: 12
    notify-suspect: true

# /guard scan <ник>
deep-scan:
  windows: 8
  timeout-seconds: 120

cross-server:
  enabled: false
  server-name: ""

reputation:
  enabled: true
  report: true
  check-on-join: true
  alert-threshold: 1

debug:
  enabled: false
  log-probability: false