# ╔══════════════════════════════════════════════════════════════╗
# ║                  GuardAC · Наказания (Punishments)             ║
# ╚══════════════════════════════════════════════════════════════╝
#
# У GuardAC одна-единственная проверка — нейросетевая «AI». Это ядро плагина,
# поэтому здесь настраивается только она.
#
# Плейсхолдеры в командах:
#   <player>          — ник игрока
#   <check>           — название проверки (всегда AI)
#   <vl>              — уровень нарушений
#   <verbose>         — % уверенности модели
#
# Спец-действия:
#   [alert]           — уведомить стафф
#   [log]             — записать в консоль
#   [reset]           — сбросить VL группы
#   [wait] <время>    — пауза (2s, 40t, 500ms)
#   [broadcast] <msg> — сообщение всем игрокам
#   [animation] <тип> — визуальная анимация ПЕРЕД следующим действием:
#                       pig | explode | particles (настройки в config.yml -> animations)
#   <команда>         — выполнить от имени консоли
#
# actions сгруппированы по уровню нарушений (VL). Срабатывает ближайший
# уровень снизу: например, при VL=4 выполнится блок «3».
#
# Этот файл — только про команды (баны/кики/т.п.) на конкретных уровнях нарушений.
# Часть защиты (ранние предупреждения, мягкое ослабление в бою) настраивается отдельно
# в config.yml и сюда не заводится — у неё нет команд, только вкл/выкл и пороги.

Punishments:

  AI:
    checks:
      - "AI"
    actions:
      1:
        - "[alert]"
        - "[log]"
      3:
        - "[alert]"
        - "[log]"
        - "[broadcast] &#22D3EE▍ &#FF4D6D<player> &7временно заблокирован системой GuardAC."
        - "tempban <player> 20h Подозрительное поведение в бою (GuardAC)."
      5:
        - "[alert]"
        - "[log]"
        - "[broadcast] &#22D3EE▍ &#FF4D6D<player> &7временно заблокирован системой GuardAC."
        - "tempban <player> 3d Подозрительное поведение в бою (GuardAC)."
      7:
        - "[alert]"
        - "[log]"
        - "[broadcast] &#22D3EE▍ &#FF4D6D<player> &7временно заблокирован системой GuardAC."
        - "tempban <player> 7d Подозрительное поведение в бою (GuardAC)."
      10:
        - "[alert]"
        - "[log]"
        - "[broadcast] &#22D3EE▍ &#FF4D6D<player> &7временно заблокирован системой GuardAC."
        - "tempban <player> 14d Подозрительное поведение в бою (GuardAC)."
      15:
        - "[alert]"
        - "[log]"
        - "[broadcast] &#22D3EE▍ &#FF4D6D<player> &cзаблокирован навсегда системой GuardAC."
        # Анимация проигрывается автоматически перед баном (config.yml animations.auto-on-ban).
        # Хочешь конкретную вместо случайной — впиши сюда, например: "[animation] pig".
        - "ban <player> Использование стороннего ПО в бою (GuardAC)."
        - "[reset]"
