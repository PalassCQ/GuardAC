# Алерт на КАЖДЫЙ уверенный удар (порог - alerts.min-hit-confidence в config.yml).
# Плейсхолдеры: {player} {check} {vl} {verbose} {prob_color} {buffer} {avg} {peak}
# (тег модели [Def]/[Extreme] намеренно не показывается здесь - он только в /guard monitor)
alerts-format: "{prefix} &8[&#FF4D6DДЕТЕКТ&8] {prob_color}{player} &7не прошёл проверку &8• {prob_color}{verbose} &8• &7буфер {buffer}"
# Накопительный алерт: каждые min-hits ударов (×3, ×6, ×9...) с пиком пачки.
# Плейсхолдеры: {player} {model} {count} {max} {prob_color} {buffer}
alerts-digest-format: "{prefix} &8[&#FF4D6DДЕТЕКТ&8] {prob_color}{player} &7не прошёл проверку {prob_color}×{count} &8• &7макс {prob_color}{max} &8• &7буфер {buffer}"
alerts-console-format: "[GuardAC] {player} | {verbose} | buffer {buffer}"
# Авто-обновление: новая версия скачана и применится после перезапуска. Плейсхолдер: {tag}
update-downloaded: "{prefix} &#4ADE80Обновление GuardAC &#AEB8C4{tag} &#4ADE80загружено &8- &7применится после перезапуска сервера."
# Aim Fingerprint: почерк прицела игрока резко изменился. Плейсхолдеры: {player} {base} {now}
fingerprint-alert: "{prefix} &8[&#A78BFAПОЧЕРК&8] &#FF4D6D&l{player} &7- стиль прицела резко изменился &8(&7{base}% &8→ &c{now}%&8)&7, возможен включённый чит."
# Раннее предупреждение стаффу. Плейсхолдеры: {player} {buffer} {flag}
suspicious-alert: "{prefix} &8[&#FFC857НАБЛЮДЕНИЕ&8] &#AEB8C4{player} &7становится подозрительным &8(&#FFC857{buffer} &8/ &7{flag}&8)"
# Сообщение игроку, когда включается доп. защита в бою (combat-suppression в config.yml).
suppression-isolate-notice: "&7Соединение нестабильно &8- &7атаки временно не засчитываются."

monitor-enabled: "&#4ADE80✔ &7Монитор &#4ADE80включён&7 &8- показываю каждый результат модели."
monitor-disabled: "&#FFC857● &7Монитор &8выключен&7."
# Плейсхолдеры: {player} {model} {color} {detailed} {buffer} {prob} {avg} {avg_color} {vl} {ping} {peak} {high_count} {suppression}
monitor-hit: "{prefix} &7{model} {color}{player} &8• {color}{detailed} &8• &7буфер {buffer}{suppression}"

