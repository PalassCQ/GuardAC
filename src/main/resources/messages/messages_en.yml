prefix: "&#22D3EE▍ &#22D3EEG&#34C2E8u&#46B1E2a&#58A0DCr&#6A8FD6d&#4D86EEA&#3B82F6C &8»&r"

no-permission: "&#FF4D6D✖ &7You don't have permission for this command."
player-not-found: "&#FF4D6D✖ &7Player &#AEB8C4{player} &7not found or offline."
run-as-player: "&#FF4D6D✖ &7This command is for players only."
reload-success: "&#4ADE80✔ &7Configuration reloaded."

alerts-enabled: "&#4ADE80✔ &7Alerts &#4ADE80enabled&7."
alerts-disabled: "&#FFC857● &7Alerts &8disabled&7."
# Fired for EVERY confident hit (threshold - alerts.min-hit-confidence in config.yml).
# Placeholders: {player} {check} {vl} {verbose} {prob_color} {buffer} {avg} {peak}
# (the [Def]/[Extreme] model tag is deliberately not shown here - only in /guard monitor)
alerts-format: "{prefix} &8[&#FF4D6DDETECT&8] {prob_color}{player} &7failed the check &8• {prob_color}{verbose} &8• &7buffer {buffer}"
# Cumulative alert: every min-hits hits (x3, x6, x9...) with the batch peak.
# Placeholders: {player} {model} {count} {max} {prob_color} {buffer}
alerts-digest-format: "{prefix} &8[&#FF4D6DDETECT&8] {prob_color}{player} &7failed the check {prob_color}×{count} &8• &7max {prob_color}{max} &8• &7buffer {buffer}"
alerts-console-format: "[GuardAC] {player} | {verbose} | buffer {buffer}"
# Auto-update: a new version was downloaded and applies after a restart. Placeholder: {tag}
update-downloaded: "{prefix} &#4ADE80GuardAC update &#AEB8C4{tag} &#4ADE80downloaded &8- &7it will apply after a server restart."
# Aim Fingerprint: player's aim style shifted sharply. Placeholders: {player} {base} {now}
fingerprint-alert: "{prefix} &8[&#A78BFAFINGERPRINT&8] &#FF4D6D&l{player} &7- aim style shifted sharply &8(&7{base}% &8→ &c{now}%&8)&7, possible cheat toggle."
# Early warning to staff. Placeholders: {player} {buffer} {flag}
suspicious-alert: "{prefix} &8[&#FFC857WATCH&8] &#AEB8C4{player} &7is becoming suspicious &8(&#FFC857{buffer} &8/ &7{flag}&8)"
# Shown to the player when the extra in-combat protection kicks in (combat-suppression in config.yml).
suppression-isolate-notice: "&7Connection unstable &8- &7attacks are temporarily not registering."

monitor-enabled: "&#4ADE80✔ &7Monitor &#4ADE80enabled&7 &8- showing every model result."
monitor-disabled: "&#FFC857● &7Monitor &8disabled&7."
# Placeholders: {player} {model} {color} {detailed} {buffer} {prob} {avg} {avg_color} {vl} {ping} {peak} {high_count} {suppression}
monitor-hit: "{prefix} &7{model} {color}{player} &8• {color}{detailed} &8• &7buffer {buffer}{suppression}"

