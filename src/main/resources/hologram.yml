hologram:
  enabled: true
  update-interval-ticks: 5
  view-distance: 40.0
  y-offset: 2.6

  header: "&7AVG {AVG}"

  hit-format: "&8○ {PROB}"

  max-hits: 5

  line-height: 0.26

  colors:
    low: "&a"
    medium: "&2"
    high: "&6"
    critical: "&c"
    thresholds:
      medium: 0.35
      high: 0.50
      critical: 0.80
