hologram:
  enabled: true
  update-interval-ticks: 5
  view-distance: 40.0
  y-offset: 2.6

  header: "&7AVG {AVG}"

  hit-format: "&8○ {PROB}"

  max-hits: 5

  line-height: 0.26

  colors:
    low: "&a"           # 0-35%
    medium: "&2"        # 35-50%
    high: "&6"          # 50-80%
    critical: "&c"      # 80-100%
    thresholds:
      medium: 0.35
      high: 0.50
      critical: 0.80
