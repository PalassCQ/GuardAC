hologram:
  enabled: true
  update-interval-ticks: 5
  view-distance: 40.0
  # Высота нижней строки ленты над ногами игрока. Лента растёт вверх,
  # поэтому она никогда не наезжает на обычный ник игрока.
  y-offset: 2.6

  # Верхняя строка. Плейсхолдер {AVG} - средняя вероятность в % (с цветом).
  header: "&7AVG {AVG}"

  # Лента последних ударов под строкой AVG: сверху самый свежий результат.
  # Плейсхолдер {PROB} - вероятность удара в % (с цветом).
  hit-format: "&8○ {PROB}"

  # Сколько последних ударов показывать (0 - только строка AVG).
  max-hits: 4

  # Расстояние между строками в блоках.
  line-height: 0.26

  # Цвета для чисел в зависимости от % вероятности
  # По умолчанию:
  #   0-35%  → зелёный (&a)
  #   35-50% → салатовый (&2 / светло-зелёный)
  #   50-80% → оранжевый (&6)
  #   80-100% → красный (&c)
  colors:
    low: "&a"           # 0-35%
    medium: "&2"        # 35-50%
    high: "&6"          # 50-80%
    critical: "&c"      # 80-100%
    thresholds:
      medium: 0.35
      high: 0.50
      critical: 0.80
