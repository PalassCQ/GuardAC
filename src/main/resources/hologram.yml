hologram:
  enabled: true
  update-interval-ticks: 5
  view-distance: 40.0
  y-offset: 2.9

  # Доступные плейсхолдеры:
  #   {AVG}  - средняя вероятность (%) с цветом
  #   {PROB} - последняя вероятность (%) с цветом
  #   {VL}   - уровень нарушений
  #   {HIST} - последние 5 ударов с цветами, например: "82 91 45 67"
  format: "&7AVG {AVG} &8| {HIST}"

  # Цвета для чисел в зависимости от % вероятности
  # По умолчанию:
  #   0-35%  → зелёный (&a)
  #   35-50% → салатовый (&2 / светло-зелёный)
  #   50-80% → оранжевый (&6)
  #   80-100% → красный (&c)
  colors:
    low: "&a"           # 0-35%
    medium: "&2"        # 35-50%
    high: "&6"          # 50-80%
    critical: "&c"      # 80-100%
    thresholds:
      medium: 0.35
      high: 0.50
      critical: 0.80
